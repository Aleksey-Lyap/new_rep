  <h1>Проверка событий ecommerce</h1>

  <!-- Товар один и тот же для всех событий -->
  <script>
    const p = {
      id: "P12345",
      name: "Футболка базовая",
      price: 999.00,
      brand: "Яндекс / Yandex",
      category: "Одежда / Мужская одежда / Футболки",
      variant: "Серый цвет"
    };
  </script>

<div class="btn-group">
    <!-- Просмотр товара -->
    <button class="btn-view" onclick="dataLayer.push({'ecommerce':{'currencyCode':'RUB','detail':{'products':[p]}}}); console.log('view sent');">
      1. Просмотр товара
    </button>

    <!-- Добавить в корзину -->
    <button class="btn-add" onclick="dataLayer.push({'ecommerce':{'currencyCode':'RUB','add':{'products':[{...p,quantity:1,list:'Каталог',position:1}]}}}); console.log('add sent');">
      2. Добавить в корзину
    </button>

    <!-- Покупка -->
    <button class="btn-buy" onclick="dataLayer.push({'ecommerce':{'currencyCode':'RUB','purchase':{'actionField':{'id':'TRX999'},'products':[{...p,quantity:1,list:'Заказ',position:1}]}}}); console.log('purchase sent');">
      3. Покупка
    </button>

    <!-- Удалить из корзины -->
    <button class="btn-remove" onclick="dataLayer.push({'ecommerce':{'currencyCode':'RUB','remove':{'products':[{...p,quantity:1,list:'Корзина',position:1}]}}}); console.log('remove sent');">
      4. Удалить из корзины
    </button>

    <!-- Пустая кнопка -->
    <button class="btn-empty" onclick="console.log('пустая кнопка нажата');">
      5. Пустая кнопка
    </button>
  </div>
